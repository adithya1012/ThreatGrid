services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: zscaler_soc_postgres
    environment:
      POSTGRES_DB: zscaler_soc
      POSTGRES_USER: socadmin
      POSTGRES_PASSWORD: socpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socadmin -d zscaler_soc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatgrid_net

  # ── 2. Backend (Fastify) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zscaler_soc_backend
    env_file:
      - ./backend/.env           # supplies OPENAI_API_KEY (and optionally HF_API_TOKEN)
    environment:
      PORT: "3001"
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: zscaler_soc
      PGUSER: socadmin
      PGPASSWORD: socpassword
      MCP_SERVER_URL: "http://mcp-server:3002"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    ports:
      - "3001:3001"              # exposed for direct API access / curl testing
    networks:
      - threatgrid_net

  # ── 3. Frontend (Vite → nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zscaler_soc_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"                # open http://localhost:5173 in the browser
    networks:
      - threatgrid_net

  # ── 4. MCP Server ─────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: zscaler_soc_mcp_server
    environment:
      MCP_SERVER_PORT: "3002"
      DATABASE_URL: "postgresql://socadmin:socpassword@postgres:5432/zscaler_soc"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"              # exposed for direct MCP access
    networks:
      - threatgrid_net

volumes:
  postgres_data:
    driver: local

networks:
  threatgrid_net:
    driver: bridge
